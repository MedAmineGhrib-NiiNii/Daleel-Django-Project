<!DOCTYPE html>
<html lang="{{ LANG }}"{% if RTL %} dir="rtl"{% endif %}>
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demande envoyée · Amal</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=Public+Sans:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#15302b;--teal:#0f6e62;--teal-dark:#0b5249;--amber:#e0992f;--cream:#f7f3ea;--line:#e7e0d4;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Public Sans',sans-serif;color:var(--ink);background:var(--cream);min-height:100vh;display:grid;place-items:center;padding:24px}
    [dir="rtl"] body{font-family:'Noto Naskh Arabic','Public Sans',sans-serif}
    .box{max-width:440px;text-align:center;background:#fffdf8;border:1px solid var(--line);border-radius:20px;padding:44px 40px;box-shadow:0 8px 30px rgba(21,48,43,.07)}
    .ic{width:64px;height:64px;border-radius:18px;background:#e6f3ec;display:grid;place-items:center;margin:0 auto 20px}
    .ic svg{width:32px;height:32px;stroke:#3f9d6b}
    h1{font-family:'Source Serif 4',Georgia,serif;font-size:25px;font-weight:600;margin-bottom:10px}
    p{color:#5a6b66;font-size:15px;line-height:1.6;margin-bottom:24px}
    .btn{display:inline-block;font-size:14px;font-weight:600;padding:12px 22px;border-radius:12px;background:var(--teal);color:#fff;text-decoration:none}
  </style>
</head>
<body>
  <div class="box">
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
    <h1>Demande envoyée ✓</h1>
    <p>Merci {{ full_name }}. Votre demande de compte a bien été transmise au Directeur. Vous pourrez vous connecter dès qu'elle sera approuvée.</p>
    <a class="btn" href="{% url 'login' %}">Retour à la connexion</a>
  </div>
</body>
</html>
