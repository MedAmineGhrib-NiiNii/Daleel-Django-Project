<!DOCTYPE html>
<html lang="{{ LANG }}"{% if RTL %} dir="rtl"{% endif %}>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion · Amal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Public+Sans:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#15302b;--teal:#0f6e62;--teal-dark:#0b5249;--amber:#e0992f;--cream:#f7f3ea;--line:#e7e0d4;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Public Sans',sans-serif;color:var(--ink);display:flex;min-height:100vh}
    [dir="rtl"] body,[dir="rtl"] input{font-family:'Noto Naskh Arabic','Public Sans',sans-serif}
    [dir="rtl"] h1,[dir="rtl"] h2{font-family:'Noto Naskh Arabic','Source Serif 4',serif}
    .lsw{position:absolute;top:18px;right:20px;display:flex;gap:4px;z-index:5}
    .lsw a{font-size:12px;font-weight:600;color:#8a968f;padding:5px 9px;border-radius:7px;text-decoration:none}
    .lsw a.on{background:var(--teal);color:#fff}
    h1,h2{font-family:'Source Serif 4',serif;letter-spacing:-.01em}

    /* Brand panel */
    .brand-side{flex:1.1;background:linear-gradient(150deg,var(--teal) 0%,var(--teal-dark) 100%);color:#eaf6f2;
      padding:54px 56px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
    .brand-side::after{content:"";position:absolute;width:520px;height:520px;border-radius:50%;
      background:radial-gradient(circle,rgba(224,153,47,.32),transparent 65%);right:-160px;bottom:-160px}
    .brand-top{display:flex;align-items:center;gap:13px;position:relative;z-index:1}
    .mark{width:46px;height:46px;border-radius:13px;background:var(--amber);display:grid;place-items:center;
      font-family:'Source Serif 4',serif;font-weight:700;color:var(--teal-dark);font-size:24px}
    .brand-top b{font-family:'Source Serif 4',serif;font-size:25px;color:#fff;line-height:1}
    .brand-top span{font-size:12px;color:#9ec7bd}
    .brand-mid{position:relative;z-index:1;max-width:440px}
    .brand-mid h1{font-size:42px;font-weight:600;line-height:1.12;color:#fff;margin-bottom:18px}
    .brand-mid p{font-size:16px;line-height:1.6;color:#cfe6df}
    .stats{display:flex;gap:30px;position:relative;z-index:1}
    .stats div b{font-family:'Source Serif 4',serif;font-size:28px;color:var(--amber);display:block}
    .stats div small{font-size:12px;color:#9ec7bd}

    /* Form */
    .form-side{flex:1;background:var(--cream);display:grid;place-items:center;padding:40px}
    .form-card{width:100%;max-width:380px}
    .form-card h2{font-size:26px;font-weight:600;margin-bottom:6px}
    .form-card .lede{color:#5a6b66;font-size:14px;margin-bottom:26px}
    label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
    .field{margin-bottom:18px}
    input{width:100%;font-family:inherit;font-size:15px;padding:13px 15px;border:1px solid var(--line);
      border-radius:12px;background:#fffdf8;transition:.15s;color:var(--ink)}
    input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 4px rgba(15,110,98,.12)}
    .btn{width:100%;font-family:inherit;font-size:15px;font-weight:600;padding:14px;border:none;border-radius:12px;
      background:var(--teal);color:#fff;cursor:pointer;transition:.15s;margin-top:4px}
    .btn:hover{background:var(--teal-dark)}
    .err{background:#f8e3df;border:1px solid #eecabf;color:#a23a2e;font-size:13px;padding:11px 14px;border-radius:11px;margin-bottom:18px}
    .hint{margin-top:22px;font-size:12px;color:#8a968f;text-align:center;line-height:1.6}
    @media(max-width:820px){.brand-side{display:none}}
  </style>
</head>
<body>
  <section class="brand-side">
    <div class="brand-top">
      <div class="mark">أ</div>
      <div><b>Amal</b><br><span>{{ t.brand_tagline }}</span></div>
    </div>
    <div class="brand-mid">
      <h1>{{ t.login_headline }}</h1>
      <p>{{ t.login_mission }}</p>
    </div>

  </section>

  <section class="form-side">
    <div class="lsw">{% for code, label in LANGUAGES %}<a href="{% url 'set_language' %}?lang={{ code }}" class="{% if LANG == code %}on{% endif %}">{{ code|upper }}</a>{% endfor %}</div>
    <div class="form-card">
      <h2>{{ t.login_welcome }}</h2>
      <p class="lede">{{ t.login_sub }}</p>
      {% if form.errors %}<div class="err">{{ t.login_error }}</div>{% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="field">
          <label for="username">{{ t.login_user }}</label>
          <input type="text" name="username" id="username" required autofocus placeholder="ex. conseiller">
        </div>
        <div class="field">
          <label for="password">{{ t.login_pass }}</label>
          <input type="password" name="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn">{{ t.login_btn }}</button>
        <a href="{% url 'register' %}" style="display:block;text-align:center;margin-top:14px;font-size:13px;font-weight:600;color:var(--teal);text-decoration:none">{{ t.register_link }}</a>
      </form>

    </div>
  </section>
</body>
</html>
