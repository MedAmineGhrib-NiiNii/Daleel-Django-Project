<!DOCTYPE html>
<html lang="{{ LANG }}"{% if RTL %} dir="rtl"{% endif %}>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accès refusé · Amal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=Public+Sans:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#15302b;--teal:#0f6e62;--teal-dark:#0b5249;--amber:#e0992f;--cream:#f7f3ea;--line:#e7e0d4;--high:#c2483b;}
    *{box-sizing:border-box;margin:0;padding:0}
    [dir="rtl"] body{font-family:'Noto Naskh Arabic','Public Sans',sans-serif}
    [dir="rtl"] h1{font-family:'Noto Naskh Arabic','Source Serif 4',serif}
    body{font-family:'Public Sans',sans-serif;color:var(--ink);min-height:100vh;display:grid;place-items:center;
      background:var(--cream);background-image:radial-gradient(circle at 1px 1px,rgba(21,48,43,.05) 1px,transparent 0);background-size:22px 22px;padding:24px}
    .box{max-width:460px;text-align:center;background:#fffdf8;border:1px solid var(--line);border-radius:20px;
      padding:44px 40px;box-shadow:0 8px 30px rgba(21,48,43,.07)}
    .shield{width:72px;height:72px;border-radius:20px;background:#f8e3df;display:grid;place-items:center;margin:0 auto 22px}
    .shield svg{width:34px;height:34px;stroke:var(--high)}
    .tag{display:inline-block;background:#f8e3df;color:var(--high);font-size:12px;font-weight:600;letter-spacing:.05em;
      padding:5px 13px;border-radius:999px;margin-bottom:14px}
    h1{font-family:'Source Serif 4',serif;font-size:27px;font-weight:600;margin-bottom:10px}
    p{color:#5a6b66;font-size:15px;line-height:1.6;margin-bottom:26px}
    .btn{display:inline-flex;align-items:center;gap:8px;font-family:inherit;font-size:14px;font-weight:600;
      padding:12px 22px;border-radius:12px;background:var(--teal);color:#fff;text-decoration:none;transition:.15s}
    .btn:hover{background:var(--teal-dark)}
    .note{margin-top:18px;font-size:12px;color:#8a968f}
  </style>
</head>
<body>
  <div class="box">
    <div class="shield">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9.5 12l1.8 1.8L15 10"/><line x1="4.5" y1="4.5" x2="19.5" y2="19.5" stroke="#c2483b"/></svg>
    </div>
    <span class="tag">{{ t.forbidden_tag }}</span>
    <h1>{{ t.forbidden_title }}</h1>
    <p>{{ message|default:t.forbidden_default }}</p>
    <a href="{% url 'dashboard_router' %}" class="btn">{{ t.back_to_space }}</a>
    <div class="note">{{ t.forbidden_note }}</div>
  </div>
</body>
</html>
